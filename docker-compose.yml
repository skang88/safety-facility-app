services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - /data/mongo:/data/db

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_ENABLED: "false"
    depends_on:
      - mongo

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "${BACKEND_EXTERNAL_PORT:-5050}:${BACKEND_PORT:-5000}"
    volumes:
      - /data/uploads:/app/uploads
    environment:
      - PORT=${BACKEND_PORT:-5000}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/safety_facilities}
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-8090}:${FRONTEND_PORT:-80}"
    depends_on:
      - backend
