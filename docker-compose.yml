services:

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_EXTERNAL_PORT:-5050}:${BACKEND_PORT:-5000}"
    volumes:
      - /data/uploads:/app/uploads
    environment:
      - PORT=${BACKEND_PORT:-5000}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/safety_facilities}
    depends_on:
      - mongo

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-8090}:${FRONTEND_PORT:-80}"
    depends_on:
      - backend
