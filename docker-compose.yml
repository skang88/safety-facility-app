services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - /data/mongo:/data/db
    networks:
      - safety-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "${BACKEND_EXTERNAL_PORT:-5050}:${BACKEND_PORT:-5000}"
    volumes:
      - /data/uploads:/app/uploads
    environment:
      - PORT=${BACKEND_PORT:-5000}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/safety_facilities}
    networks:
      - safety-net
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-8090}:${FRONTEND_PORT:-80}"
    networks:
      - safety-net
    depends_on:
      - backend

networks:
  safety-net:
    driver: bridge